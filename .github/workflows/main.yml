name: Build OpenDarwin 1.0 ARM64 Wayland

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y live-build live-config live-boot live-manual debian-archive-keyring qemu-user-static

      - name: Run build script
        run: |
          chmod +x build-arm.sh
          ./build-arm.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: opendarwin-1.0-arm64-wayland
          path: build/live-image-arm64.iso
          retention-days: 7

      - name: Summary
        run: |
          echo "## OpenDarwin 1.0 ARM64 Wayland Hazir" >> $GITHUB_STEP_SUMMARY
          echo "**Kullanici:** user / 123456" >> $GITHUB_STEP_SUMMARY
